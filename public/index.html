<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Мои Листы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#0a0e14;--bg-card:#131920;--bg-card2:#1a2230;--bg-nav:#0a0e14;
  --accent:#4fc3f7;--accent2:#29b6f6;--green:#66bb6a;--red:#ef5350;
  --orange:#ffa726;--yellow:#ffee58;--purple:#ab47bc;--pink:#ec407a;
  --text:#e8eaed;--text-dim:#9aa0a6;--text-sec:#b0b8c0;
  --border:#1e2a36;--border2:#2a3a4a;
  --radius:14px;--radius-sm:10px;--radius-lg:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* Sections */
.section{display:none;padding:16px;animation:fadeUp .35s cubic-bezier(.4,0,.2,1)}.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Header */
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.page-title{font-size:24px;font-weight:800;letter-spacing:-0.5px}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .15s}
.back-btn:active{transform:scale(.9);background:var(--bg-card2)}

/* Eye toggle */
.eye-btn{width:40px;height:40px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:all .2s;position:absolute;top:16px;right:16px;z-index:5}
.eye-btn:active{transform:scale(.9)}
.hidden-val{filter:blur(8px);user-select:none;transition:filter .3s ease}.hidden-val.show{filter:none}

/* Summary card */
.summary{background:linear-gradient(145deg,#0f1923 0%,#162030 50%,#0f1923 100%);border-radius:var(--radius-lg);padding:28px 20px 20px;margin-bottom:16px;text-align:center;border:1px solid var(--border2);position:relative;overflow:hidden}
.summary::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),var(--accent),var(--purple),var(--pink))}
.summary .label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:6px}
.summary .big{font-size:34px;font-weight:800;letter-spacing:-1px}
.summary .big.green{color:var(--green)}.summary .big.red{color:var(--red)}

/* Mini cards row */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--bg-card);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;border:1px solid var(--border)}
.stat .icon{font-size:18px;margin-bottom:4px}.stat .lbl{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat .val{font-size:17px;font-weight:700}.stat .val.g{color:var(--green)}.stat .val.a{color:var(--accent)}.stat .val.y{color:var(--yellow)}.stat .val.r{color:var(--red)}

/* Cards */
.card{background:var(--bg-card);border-radius:var(--radius);padding:16px;margin-bottom:10px;border:1px solid var(--border);animation:fadeIn .3s ease}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
.card-val{font-size:15px;font-weight:700;color:var(--green)}

/* Progress */
.bar{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.bar-fill.g{background:var(--green)}.bar-fill.a{background:var(--accent)}.bar-fill.p{background:var(--purple)}

/* Rows */
.row{display:flex;justify-content:space-between;align-items:center;padding:7px 0}
.row-l{font-size:14px;color:var(--text-sec)}.row-v{font-size:14px;font-weight:600}

/* Transaction */
.tx{display:flex;align-items:center;padding:10px 0;border-top:1px solid var(--border)}
.tx:first-child{border-top:none}.tx-d{color:var(--text-dim);width:42px;font-size:11px;flex-shrink:0}.tx-t{flex:1;margin:0 10px;font-size:13px}.tx-a{font-weight:700;font-size:13px;color:var(--red)}.tx-a.pos{color:var(--green)}

/* Debts */
.debtor{margin-bottom:14px}
.debtor-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.debtor-name{font-size:15px;font-weight:700}
.tag{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:700;letter-spacing:.3px}
.tag-g{background:rgba(102,187,106,.12);color:var(--green)}.tag-y{background:rgba(255,238,88,.12);color:var(--yellow)}
.d-entry{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;font-size:13px;border-top:1px solid var(--border)}
.d-entry:first-of-type{border-top:none}.d-amt{font-weight:700}
.d-meta{display:flex;gap:8px;margin-top:2px}.d-date{font-size:11px;color:var(--text-dim)}.d-note{font-size:11px;color:var(--orange);font-style:italic}

/* Expenses */
.month{margin-bottom:20px}
.month-h{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;color:var(--text-sec)}
.month-t{color:var(--red);font-weight:700}
.e-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid var(--border)}
.e-row:first-child{border-top:none}.e-info{flex:1}
.e-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.c-fam{color:var(--purple)}.c-util{color:var(--accent)}.c-food{color:var(--orange)}.c-other{color:var(--text-dim)}
.e-desc{font-size:14px}.e-date{font-size:11px;color:var(--text-dim);margin-top:1px}
.e-amt{font-size:14px;font-weight:700;color:var(--red);white-space:nowrap;margin-left:12px}

/* Sub-tabs */
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{flex:1;padding:11px 6px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.tab.on{background:var(--accent);color:#0a0e14;border-color:var(--accent);box-shadow:0 2px 12px rgba(79,195,247,.25)}
.tab:active{transform:scale(.96)}

/* Generic */
.gs{margin-bottom:16px}
.gs-t{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px}
.gi{display:flex;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;line-height:1.5}
.gi:last-child{border-bottom:none}.gi-i{margin-right:8px;color:var(--text-dim);font-size:11px;margin-top:3px;flex-shrink:0}
.gi-b{font-weight:700;color:var(--text-dim);font-size:12px;margin-top:8px;text-transform:uppercase;letter-spacing:.5px}
.gi-c{display:flex;align-items:flex-start;gap:10px;padding:8px 0}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s}
.chk.on{background:var(--green);border-color:var(--green)}.chk.on::after{content:'✓';color:#fff;font-size:13px;font-weight:800}
.gtbl{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px}
.gtbl th{text-align:left;padding:8px;color:var(--text-dim);font-size:10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:2px solid var(--border2)}
.gtbl td{padding:8px;border-bottom:1px solid var(--border)}

/* Overview */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ov{background:var(--bg-card);border-radius:var(--radius);padding:24px 16px;border:1px solid var(--border);cursor:pointer;transition:all .2s;text-align:center;position:relative;overflow:hidden}
.ov:active{transform:scale(.96);background:var(--bg-card2)}
.ov::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .2s}
.ov:active::before{opacity:1}
.ov:nth-child(1)::before{background:var(--green)}.ov:nth-child(2)::before{background:var(--accent)}.ov:nth-child(3)::before{background:var(--purple)}.ov:nth-child(4)::before{background:var(--orange)}
.ov-icon{font-size:36px;margin-bottom:10px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3))}
.ov-title{font-size:15px;font-weight:700}.ov-sub{font-size:11px;color:var(--text-dim);margin-top:4px}

/* Empty / Loading */
.empty{text-align:center;padding:60px 20px;color:var(--text-dim)}.empty-i{font-size:48px;margin-bottom:12px;opacity:.6}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}
.err{text-align:center;color:var(--red);padding:40px 20px;font-size:14px}

/* Nav removed — overview is default */
</style>
</head>
<body>
<div id="app"><div style="text-align:center;padding:60px 20px;color:var(--text-dim)"><div class="spin"></div>Загрузка...</div></div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();document.body.style.background='#0a0e14'}

function api(u){const h={};const d=tg?.initData;if(d&&d.length>10)h['X-Telegram-Init-Data']=d;return fetch(u,{headers:h}).then(r=>{if(r.status===401||r.status===403)throw new Error('Открой через Telegram');if(!r.ok)throw new Error('Ошибка');return r.json()})}
function f(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')}
function p(s){if(!s)return 0;return parseInt(s.replace(/[^0-9]/g,''))||0}
const PC=['g','a','p'];

let L=[],tab='overview',fTab='balance',fCache=null,hidden=true;

function M(t){return`<span class="hidden-val ${hidden?'':'show'}">${t}</span>`}
function tog(){hidden=!hidden;document.querySelectorAll('.hidden-val').forEach(e=>e.classList.toggle('show',!hidden));document.querySelectorAll('.eye-btn').forEach(e=>e.textContent=hidden?'👁️':'🙈')}

// === OVERVIEW ===
function ovHTML(){
  let h=`<div class="page-header"><div class="page-title">📋 Мои Листы</div></div><div class="ov-grid">`;
  L.forEach((l,i)=>{h+=`<div class="ov" onclick="go('${l.id}')"><div class="ov-icon">${l.icon}</div><div class="ov-title">${l.title}</div><div class="ov-sub">${l.updated}</div></div>`});
  return h+`</div>`;
}

// === FINANCE ===
function finHTML(d){
  const b=d.data.budget,dd=d.data.debts,ex=d.data.expenses;
  let h=`<div class="page-header"><div class="back-btn" onclick="go('overview')">←</div><div class="page-title">${d.icon} ${d.title}</div></div>`;
  h+=`<div class="tabs">
    <button class="tab ${fTab==='balance'?'on':''}" onclick="fTab='balance';reFin()">💰 Баланс</button>
    <button class="tab ${fTab==='debts'?'on':''}" onclick="fTab='debts';reFin()">💸 Долги</button>
    <button class="tab ${fTab==='expenses'?'on':''}" onclick="fTab='expenses';reFin()">📊 Расходы</button>
  </div>`;
  if(fTab==='balance')h+=balHTML(b);
  else if(fTab==='debts')h+=debHTML(dd);
  else h+=expHTML(ex);
  return h;
}

function balHTML(b){
  const gt=b.totalBalance?.['GRAND TOTAL']||'0';
  let ds=0,cs=0,ks=0;
  b.deposits?.forEach(x=>ds+=p(x.balance));b.cards?.forEach(x=>cs+=p(x.balance));b.cash?.forEach(x=>ks+=p(x.amount));
  let h=`<div class="summary" style="position:relative"><div class="eye-btn" onclick="tog()">${hidden?'👁️':'🙈'}</div><div class="label">Общий баланс</div><div class="big green">${M(gt)}</div></div>`;
  h+=`<div class="stats-row">
    <div class="stat"><div class="icon">🏦</div><div class="lbl">Вклады</div><div class="val g">${M(f(ds))}</div></div>
    <div class="stat"><div class="icon">💳</div><div class="lbl">Карты</div><div class="val a">${M(f(cs))}</div></div>
    <div class="stat"><div class="icon">💵</div><div class="lbl">Наличные</div><div class="val y">${M(f(ks))}</div></div>
  </div>`;
  h+=`<div class="card"><div class="card-head"><span class="card-title">🏦 Вклады</span><span class="card-val">${M(f(ds)+' сум')}</span></div>`;
  b.deposits?.forEach((x,i)=>{const pct=ds>0?(p(x.balance)/ds*100).toFixed(0):0;
    h+=`<div class="row"><span class="row-l">${x.bank}</span><span class="row-v">${M(x.balance)}</span></div><div class="bar"><div class="bar-fill ${PC[i%3]}" style="width:${pct}%"></div></div>`;
  });h+=`</div>`;
  h+=`<div class="card"><div class="card-head"><span class="card-title">💳 Карты</span><span class="card-val">${M(f(cs)+' сум')}</span></div>`;
  b.cards?.forEach(c=>{h+=`<div class="row"><span class="row-l">${c.card}</span><span class="row-v">${M(c.balance)}</span></div>`});h+=`</div>`;
  h+=`<div class="card"><div class="card-head"><span class="card-title">💵 Наличные</span><span class="card-val">${M(f(ks)+' сум')}</span></div>`;
  b.cash?.forEach(c=>{h+=`<div class="row"><span class="row-l">${c.note}</span><span class="row-v">${M(c.amount)}</span></div>`});h+=`</div>`;
  if(b.transactions?.length>0){
    h+=`<div class="card"><div class="card-head"><span class="card-title">📋 Операции</span></div>`;
    b.transactions.forEach(tx=>{const inc=tx.amount.includes('+');h+=`<div class="tx"><span class="tx-d">${tx.date}</span><span class="tx-t">${tx.description}</span><span class="tx-a ${inc?'pos':''}">${M(tx.amount)}</span></div>`});
    h+=`</div>`;
  }
  return h;
}

function debHTML(d){
  let u=0,us=0;d.totals?.forEach(t=>{if(t.currency.includes('сум'))u=p(t.amount);if(t.currency.includes('USD'))us=p(t.amount)});
  let h=`<div class="stats-row" style="grid-template-columns:1fr 1fr">
    <div class="stat"><div class="lbl">Сум</div><div class="val g">${M(f(u)+' сум')}</div></div>
    <div class="stat"><div class="lbl">USD</div><div class="val y">${M('$'+f(us))}</div></div>
  </div>`;
  d.debtors?.forEach(d2=>{
    const isU=d2.total.includes('$');
    h+=`<div class="card"><div class="debtor-head"><span class="debtor-name">${d2.name}</span><span class="tag ${isU?'tag-y':'tag-g'}">${M(d2.total)}</span></div>`;
    d2.entries.forEach(e=>{
      h+=`<div class="d-entry"><div><span class="d-amt">${M(e.amount||'')}</span><div class="d-meta">${e.date?`<span class="d-date">${e.date}</span>`:''}${e.note?`<span class="d-note">${e.note}</span>`:''}</div></div><span style="font-size:16px">${(e.returned||e.received)==='✅'?'✅':'⏳'}</span></div>`;
    });h+=`</div>`;
  });return h;
}

function expHTML(ex){
  let ta=0;ex.months?.forEach(m=>ta+=p(m.total));
  let h=`<div class="summary"><div class="label">Всего расходов</div><div class="big red">${M(f(ta)+' сум')}</div></div>`;
  ex.months?.forEach(m=>{
    h+=`<div class="month"><div class="month-h"><span>${m.name}</span><span class="month-t">${M(m.total)}</span></div>`;
    const bc={};m.expenses.forEach(e=>{if(!bc[e.category])bc[e.category]=[];bc[e.category].push(e)});
    Object.entries(bc).forEach(([cat,items])=>{
      let ct=0;items.forEach(i=>ct+=p(i.amount));
      const cc=cat.includes('Семья')?'c-fam':cat.includes('ЖКХ')?'c-util':cat.includes('Еда')?'c-food':'c-other';
      h+=`<div class="card"><div class="card-head"><span class="card-title"><span class="e-cat ${cc}">${cat}</span></span><span class="e-amt" style="font-size:13px">${M(f(ct)+' сум')}</span></div>`;
      items.forEach(i=>{h+=`<div class="e-row"><div class="e-info"><div class="e-desc">${i.description}</div><div class="e-date">${i.date}</div></div><div class="e-amt">${M(i.amount)}</div></div>`});
      h+=`</div>`;
    });h+=`</div>`;
  });return h;
}

function reFin(){if(fCache){document.getElementById('app').innerHTML=finHTML(fCache);window.scrollTo(0,0)}}

// === GENERIC ===
function genHTML(d){
  const s=d.data;
  let h=`<div class="page-header"><div class="back-btn" onclick="go('overview')">←</div><div class="page-title">${d.icon} ${d.title}</div></div>`;
  if(!s.sections||!s.sections.length)return h+`<div class="empty"><div class="empty-i">${d.icon}</div>Пусто — добавь что-нибудь!</div>`;
  s.sections.forEach(sec=>{
    h+=`<div class="gs">`;if(sec.title)h+=`<div class="gs-t">${sec.title}</div>`;
    sec.tables?.forEach(t=>{h+=`<div class="card"><table class="gtbl"><thead><tr>${t.headers.map(th=>`<th>${th}</th>`).join('')}</tr></thead><tbody>${t.rows.map(r=>`<tr>${t.headers.map(th=>`<td>${r[th]||''}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`});
    sec.items?.forEach(item=>{
      if(item.bold)h+=`<div class="gi-b">${item.text}</div>`;
      else if(item.hasCheckbox)h+=`<div class="gi-c"><div class="chk ${item.checked?'on':''}" onclick="this.classList.toggle('on')"></div><span>${item.text}</span></div>`;
      else h+=`<div class="gi"><span class="gi-i">${item.number?item.number+'.':'•'}</span><span>${item.text}</span></div>`;
    });h+=`</div>`;
  });return h;
}

// === NAV ===
function go(id){
  tab=id;
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.t===id));
  const el=document.getElementById('app');
  if(id==='overview'){el.innerHTML=ovHTML();window.scrollTo(0,0);return}
  el.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--text-dim)"><div class="spin"></div>Загрузка...</div>';
  api('/api/list/'+id).then(d=>{
    let html='';
    if(d.type==='finance'){fCache=d;html=finHTML(d)}else html=genHTML(d);
    el.innerHTML=html;window.scrollTo(0,0);
  }).catch(e=>{el.innerHTML=`<div class="err">⚠️ ${e.message}</div>`});
}

// === INIT ===
api('/api/lists').then(data=>{
  L=data.lists;
  go('overview');
}).catch(e=>{document.getElementById('app').innerHTML=`<div class="err">⚠️ ${e.message}</div>`});
</script>
</body>
</html>
